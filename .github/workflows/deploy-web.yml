name: Deploy Web (GitHub Pages)

# Baut die Web-App und veröffentlicht sie auf GitHub Pages.
#
# Optional: Setzt du in deinem Repo die Secrets SUPABASE_URL + SUPABASE_ANON_KEY
# (Settings → Secrets and variables → Actions), werden sie beim Build fest
# eingebacken → deine Seite verbindet sich automatisch mit deiner Datenbank.
# Ohne diese Secrets (z. B. ein fremder Fork) startet die Seite LEER und fragt
# beim ersten Start im Onboarding nach URL + Schlüssel.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deploy gleichzeitig.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get

      # base-href entspricht dem Repo-Namen, damit es auch in Forks passt
      # (Seite liegt unter https://<user>.github.io/<repo>/).
      # --no-web-resources-cdn: CanvasKit/Schriften lokal mitliefern statt von
      # gstatic.com laden. Sonst bleibt die Seite weiss, wenn gstatic langsam
      # oder gesperrt ist (haengt beim Engine-Start). Funktioniert so auch offline.
      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release --no-web-resources-cdn \
            --base-href "/${{ github.event.repository.name }}/" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
